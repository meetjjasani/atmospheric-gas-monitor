name: Build Windows .exe

on:
  push:
    tags:
      - "v*"           # Triggers on: git tag v2.0.0 && git push --tags

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies + build tools
        run: pip install -e ".[build]"

      - name: Build .exe with PyInstaller
        run: python installer/build.py

      - name: Upload .exe as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PRL-Dashboard-${{ github.ref_name }}-Windows
          path: dist/PRL Dashboard/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PRL Dashboard/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
